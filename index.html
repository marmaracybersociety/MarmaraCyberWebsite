<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://marmaracyber.com/">
    <meta property="og:title" content="Marmara Üniversitesi Siber Güvenlik Kulübü">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://marmaracyber.com/">
    <meta property="twitter:title" content="Marmara Üniversitesi Siber Güvenlik Kulübü">

    <title>Marmara Üniversitesi Siber Güvenlik Kulübü</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-primary: #ffffff;
            --text-secondary: #8f9cae;
            --neon-blue: #00f2fe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('assets/arkaplan.png') no-repeat center center / cover;
            filter: brightness(0.7);
            z-index: 0;
        }

        main {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 680px;
            padding: 3rem 2.5rem;
            text-align: center;
            background: transparent;
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.06);
            animation: fade-in-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--neon-blue);
            border-style: solid;
            opacity: 0.7;
        }

        .top-left    { top: -1px;    left: -1px;  border-width: 2px 0 0 2px; border-top-left-radius: 4px; }
        .top-right   { top: -1px;    right: -1px; border-width: 2px 2px 0 0; border-top-right-radius: 4px; }
        .bottom-left { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; border-bottom-left-radius: 4px; }
        .bottom-right{ bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-bottom-right-radius: 4px; }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 70%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .domain-highlight {
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--neon-blue);
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .social-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(0, 242, 254, 0.05);
        }

        .social-links a:hover {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            transform: translateY(-2px);
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            from, to { background-color: transparent; box-shadow: none; }
            50%      { background-color: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
        }

        @media (max-width: 600px) {
            main {
                padding: 2.5rem 1.5rem;
                width: 92%;
            }
            h1 {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 0.85rem;
                flex-direction: column;
                gap: 4px;
                text-align: center;
            }
            .cursor {
                display: none;
            }
            .social-links {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }
            .social-links a {
                padding: 12px 16px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <main id="landing-card">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <h1 id="club-title">Marmara Üniversitesi Siber Güvenlik Kulübü</h1>
        <p class="subtitle" id="site-subtitle">
            Official Landing Page &mdash; <span class="domain-highlight">marmaracyber.com</span><span class="cursor"></span>
        </p>

        <div class="social-links">
            <a href="https://www.linkedin.com/company/marmara-%C3%BCniversitesi-siber-g%C3%BCvenlik-kul%C3%BCb%C3%BC/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a href="https://www.instagram.com/marmarasiber.resmi/" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
    </main>

</body>
</html>
