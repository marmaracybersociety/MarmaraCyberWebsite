<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Marmara Üniversitesi Siber Güvenlik Kulübü (Marmara Cyber) resmi web sitesi ve doğrulama sayfası.">
    <meta name="keywords" content="Marmara Üniversitesi, Siber Güvenlik Kulübü, Marmara Cyber, marmaracyber, siber güvenlik, cybersecurity">
    <meta name="author" content="Marmara Üniversitesi Siber Güvenlik Kulübü">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://marmaracyber.com/">
    <meta property="og:title" content="Marmara Üniversitesi Siber Güvenlik Kulübü">
    <meta property="og:description" content="Marmara Üniversitesi Siber Güvenlik Kulübü (Marmara Cyber) resmi web sitesi ve doğrulama sayfası.">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://marmaracyber.com/">
    <meta property="twitter:title" content="Marmara Üniversitesi Siber Güvenlik Kulübü">
    <meta property="twitter:description" content="Marmara Üniversitesi Siber Güvenlik Kulübü (Marmara Cyber) resmi web sitesi ve doğrulama sayfası.">

    <title>Marmara Üniversitesi Siber Güvenlik Kulübü</title>
    
    <!-- Google Fonts: Space Grotesk & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #08090c;
            --card-bg: rgba(13, 15, 23, 0.4);
            --border-color: rgba(0, 242, 254, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #8f9cae;
            --neon-blue: #00f2fe;
            --neon-purple: #9b51e0;
            --glow-color: rgba(0, 242, 254, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .ambient-glow-1 {
            position: absolute;
            top: 25%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(40px);
            animation: float-slow 15s ease-in-out infinite alternate;
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: 25%;
            right: 20%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(155, 81, 224, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(50px);
            animation: float-slow-reverse 18s ease-in-out infinite alternate;
        }

        /* Subtle Matrix-like background grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 40%, transparent 100%);
            z-index: 2;
        }

        /* Main Container */
        main {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 680px;
            padding: 3rem 2.5rem;
            text-align: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 40px var(--glow-color);
            animation: fade-in-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Decorative Corners */
        .corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--neon-blue);
            border-style: solid;
            opacity: 0.7;
        }

        .top-left {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
            border-top-left-radius: 4px;
        }

        .top-right {
            top: -1px;
            right: -1px;
            border-width: 2px 2px 0 0;
            border-top-right-radius: 4px;
        }

        .bottom-left {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 2px 2px;
            border-bottom-left-radius: 4px;
        }

        .bottom-right {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
            border-bottom-right-radius: 4px;
        }

        /* Heading Style */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 70%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-glow 4s ease-in-out infinite alternate;
        }

        /* Subtitle Style */
        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .domain-highlight {
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        /* Blinking Terminal Cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--neon-blue);
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        /* Animations */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float-slow {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(40px, -30px) scale(1.1);
            }
        }

        @keyframes float-slow-reverse {
            0% {
                transform: translate(0, 0) scale(1.1);
            }
            100% {
                transform: translate(-30px, 40px) scale(0.9);
            }
        }

        @keyframes blink {
            from, to {
                background-color: transparent;
                box-shadow: none;
            }
            50% {
                background-color: var(--neon-blue);
                box-shadow: 0 0 8px var(--neon-blue);
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            main {
                padding: 2.5rem 1.5rem;
                width: 92%;
            }
            h1 {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 0.85rem;
                flex-direction: column;
                gap: 4px;
            }
            .cursor {
                display: none; /* Hide cursor on stack layout to keep it clean */
            }
        }
    </style>
</head>
<body>

    <!-- Decorative elements -->
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>
    <div class="grid-bg"></div>

    <!-- Main Card -->
    <main id="landing-card">
        <!-- Accent corners for the cyber aesthetic -->
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <h1 id="club-title">Marmara Üniversitesi Siber Güvenlik Kulübü</h1>
        <p class="subtitle" id="site-subtitle">
            Official Landing Page — <span class="domain-highlight">marmaracyber.com</span><span class="cursor"></span>
        </p>
    </main>

</body>
</html>
